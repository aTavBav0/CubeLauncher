<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="icon.png">
<title>CubeLauncher</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
@font-face {
    font-family: "Minecraftia";
    src: url("Minecraftia-Regular.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#1d1d1d;
    --panel:#2d2d2d;
    --panel-light:#393939;

    --green:#6aa84f;
    --green-light:#82c65e;
    --green-dark:#446d2c;

    --gold:#d6b64d;

    --border:#505050;
    --border-light:#727272;
    --border-dark:#262626;

    --text:#f2f2f2;
    --text-muted:#bdbdbd;
}

body{
    font-family:"Minecraftia", monospace;
    color:var(--text);

    background:
        linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.25)),
        url("bg.png");

    background-repeat:repeat;
    background-size:64px 64px;
    background-position:top left;

    image-rendering:pixelated;

    min-height:100vh;

    font-smooth:never;
    -webkit-font-smoothing:none;
    -moz-osx-font-smoothing:grayscale;
}

.wrapper{
    width:min(1150px,94%);
    margin:auto;
    padding-bottom:40px;
}

header{
    text-align:center;
    padding:42px 20px 14px;

    font-size:34px;
    letter-spacing:1px;

    text-shadow:
        3px 3px #000,
        0 0 6px rgba(0,0,0,.5);
}

.subtitle{
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
    margin-bottom:12px;
}

.section{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:8px 12px;
    margin:32px 0 18px;

    background:linear-gradient(#373737,#2d2d2d);

    border:3px solid var(--border);
    border-top-color:var(--border-light);
    border-left-color:var(--border-light);
    border-bottom-color:var(--border-dark);
    border-right-color:var(--border-dark);

    border-radius:4px;

    box-shadow:
        inset 0 1px rgba(255,255,255,.06),
        0 4px 10px rgba(0,0,0,.35);

    text-shadow:2px 2px #000;
}

#runtimeLabel{
    color:var(--gold);
    font-size:10px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
}

button{
    font-family:inherit;
    font-size:14px;
    color:white;

    padding:8px;

    background:
        linear-gradient(var(--green-light),var(--green));

    border:3px solid;
    border-color:
        #98dc73
        var(--green-dark)
        var(--green-dark)
        #98dc73;

    border-radius:3px;

    cursor:pointer;

    transition:
        background .15s,
        transform .08s,
        box-shadow .15s;

    text-shadow:2px 2px #000;

    box-shadow:
        inset 0 1px rgba(255,255,255,.15),
        0 3px 6px rgba(0,0,0,.35);
}

button:hover{
    background:
        linear-gradient(#8fd867,#71b94c);
}

button:active{
    transform:translateY(2px);

    border-color:
        var(--green-dark)
        #98dc73
        #98dc73
        var(--green-dark);

    box-shadow:none;
}

select{
    width:100%;

    font-family:inherit;
    font-size:16px;

    padding:10px;

    color:white;

    background:
        linear-gradient(#ddb84b,#c79f31);

    border:3px solid;
    border-color:
        #ffe388
        #8b6c18
        #8b6c18
        #ffe388;

    border-radius:3px;

    cursor:pointer;
    outline:none;

    margin-bottom:16px;

    text-shadow:2px 2px #000;

    transition:.15s;
}

select:hover{
    filter:brightness(1.08);
}

select option{
    background:#2f2f2f;
    color:white;
}

.footer{
    width:100%;

    margin:40px 0 0;
    padding:18px 24px;

    background:linear-gradient(#3a3a3a,#2d2d2d);

    border:3px solid;
    border-color:#727272 #262626 #262626 #727272;

    box-shadow:
        inset 0 1px rgba(255,255,255,.08),
        0 4px 8px rgba(0,0,0,.35);

    text-align:center;

    font-size:18px;
    color:#fff;

    text-shadow:2px 2px #000;
}

.legacy-text{
    color:#ffc83d;
}
</style>
</head>
<body>

<header>CubeLauncher</header>
<div class="subtitle">Choose a Minecraft Version</div>

<div class="wrapper">

<div class="section">
    <span>Latest Releases</span>
</div>

<div class="container">
<button onclick="openPage('1.20.4/index.html')">Minecraft 1.20.4 (Recreation)</button>
<button onclick="openPage('1.16.5/index.html')">Minecraft 1.16.5</button>
<button onclick="openPage('1.12.2/index.html')">Minecraft 1.12.2</button>
<button onclick="openPage('1.8/index.html')">Minecraft 1.8</button>
<button onclick="openPage('1.2.5/index.html')">Minecraft 1.2.5</button>
</div>

<div class="section">
    <span>Clients</span>
</div>


<div class="container">
<button onclick="openPage('1.12.2/pixel.html')">Pixel Client 1.12.2</button>
<button onclick="openPage('1.12.2/tuff.html')">Tuff Client 1.12.2</button>
<button onclick="openPage('1.8/astra.html')">Astra Client 1.8</button>
<button onclick="openPage('1.8/pixel.html')">Pixel Client 1.8</button>
<button onclick="openPage('1.8/resent.html')">Resent Client 1.8</button>
</div>

<div class="section">
    <span>Beta</span>
</div>

<div class="container">
<button onclick="openPage('beta/1.8.1.html')">Beta 1.8.1</button>
<button onclick="openPage('beta/1.6_3.html')">Beta 1.6.3</button>
</div>

<div class="section">
    <span>Alpha</span>
</div>

<div class="container">
<button onclick="openPage('alpha/1.2.6.html')">Alpha 1.2.6</button>
<button onclick="openPage('alpha/1.0.16.html')">Alpha 1.0.16</button>
</div>

<div class="section">
    <span>Pre-Alpha</span>
</div>

<div class="container">
<button onclick="openPage('indev/index.html')">Indev</button>
<button onclick="openPage('0.30/index.html')">Classic 0.30</button>
<button onclick="openPage('Classic/index.html')">Classic</button>
</div>

<div class="section">
    <span>Modpacks</span>
    <span id="runtimeLabel"></span>
</div>

<select id="runtime" onchange="updateRuntimeLabel()">
    <option value="wasm_gc_jspi_offline" selected>Modern Runtime</option>
    <option value="wasm_gc_legacy_offline">Legacy Runtime</option>
</select>

<div class="container">
<button class="modpack" data-name="Ultimate Collection" onclick="openModpack('ultimate')">Ultimate Collection</button>
<button class="modpack" data-name="Industrial Age" onclick="openModpack('tech')">Industrial Age</button>
<button class="modpack" data-name="All The Magic" onclick="openModpack('magic')">All The Magic</button>
<button class="modpack" data-name="Explorer's Modpack" onclick="openModpack('explore')">Explorer's Modpack</button>
<button class="modpack" data-name="SkyFactory" onclick="openModpack('skyfactory')">SkyFactory</button>
<button class="modpack" data-name="Vanilla+" onclick="openModpack('vanilla')">Vanilla+</button>
<button class="modpack" data-name="Performance Lite" onclick="openModpack('lite')">Performance Lite</button>
</div>

<div class="section">
    <span>Downloads</span>
</div>

<div class="container">

<div>
    <select onchange="downloadFile(this)">
        <option selected disabled>Maps</option>
        <option value="Maps/Shmar v1.0.5.zip">Shmar v1.0.5</option>
        <option value="Maps/Skyblock 3.07.zip">Skyblock 3.07</option>
        <option value="Maps/The Dropper OG.zip">The Dropper OG</option>
        <option value="Maps/The Temple of Notch.zip">The Temple of Notch</option>
        <option value="Maps/TU46TutorialWorld.zip">TU46 Tutorial World</option>
    </select>
</div>

<div>
    <select onchange="downloadFile(this)">
        <option selected disabled>Texture Packs</option>

        <option value="TexturePacks/Bare Bones 1.12.zip">Bare Bones (1.12.2)</option>
		<option value="TexturePacks/Bare Bones 1.16.zip">Bare Bones (1.16.5)</option>
		
        <option value="TexturePacks/cubic-sun-moon-v1.8.5.zip">Cubic Sun And Moon (All)</option>

        <option value="TexturePacks/Default-Dark-Mode-1.16-2023.7.0.zip">Default Dark Mode (1.16.5)</option>
		<option value="TexturePacks/Default-Dark-Mode-1.12-2023.6.0.zip">Default Dark Mode (1.12.2)</option>
        <option value="TexturePacks/Default-Dark-Mode-1.8-2023.6.0.zip">Default Dark Mode (1.8 | 1.20.4)</option>

		<option value="TexturePacks/Faithful 32x - 1.16.5.zip">Faithful 32x (1.16.5)</option>
        <option value="TexturePacks/Faithful 32x - 1.12.2.zip">Faithful 32x (1.12.2)</option>
        <option value="TexturePacks/Faithful 32x - 1.8.9.zip">Faithful 32x (1.8 | 1.20.4)</option>

        <option value="TexturePacks/LowOnFire_1.12.zip">LowOnFire (1.12.2)</option>
        <option value="TexturePacks/LowOnFire_1.8.9.zip">LowOnFire (1.8 | 1.20.4)</option>
		<option value="TexturePacks/LowOnFire 1.16+.zip">LowOnFire (1.16.5)</option>
		
		<option value="TexturePacks/Xray_Ultimate_1.20.2_v5.0.0.zip">Xray (1.16.5)</option>
        <option value="TexturePacks/Xray_Ultimate_1.12_v2.3.1.zip">Xray (1.8 | 1.20.4 | 1.12.2)</option>

        <option value="TexturePacks/Redstone++ v1.2 [1.12.2](1).zip">Redstone++ (1.12.2)</option>
		<option value="TexturePacks/abetter-4redstone-7pack-v1-0-5.zip">Better Redstone (1.16.5)</option>
		
        <option value="TexturePacks/NewTextures1.12.2_1.0.5.1.zip">New Textures (1.8 | 1.12.2)</option>
    </select>
</div>

<div>
    <select onchange="downloadFile(this)">
        <option selected disabled>Skins</option>

        <option value="Skins/black.png">Black</option>
        <option value="Skins/blueslime.png">Blue Slime</option>
        <option value="Skins/bluesmile.png">Blue Smile</option>
        <option value="Skins/dressedslime.png">Dressed Slime</option>
        <option value="Skins/knight.png">Knight</option>
        <option value="Skins/link.png">Link</option>
        <option value="Skins/linkbotw.png">Link (BOTW)</option>
        <option value="Skins/parrot.png">Parrot</option>
        <option value="Skins/rat.png">Rat</option>
        <option value="Skins/slime.png">Slime</option>
        <option value="Skins/slimepurple.png">Purple Slime</option>
        <option value="Skins/steve.png">Steve</option>
        <option value="Skins/white.png">White</option>
        <option value="Skins/yellowsmile.png">Yellow Smile</option>
		<option value="Skins/tvhead.png">Tv Head</option>
        <option value="Skins/agent.png">Agent</option>
        <option value="Skins/profduck.png">Prof. Duck</option>
		<option value="Skins/orbit.png">Orbit</option>
        <option value="Skins/dream.png">Dream</option>
        <option value="Skins/lengend.png">Legend</option>
    </select>
</div>

</div>

<div class="footer">
CubeLauncher - Made By TavBav99
</div>

</div>

<script>
function openPage(path){
    const popup = window.open(
        path,
        "CubeLauncher",
        "popup=yes,width=1280,height=720,left=100,top=100,resizable=yes,scrollbars=yes"
    );

    if (popup) popup.focus();
}

function openModpack(modpack){
    const runtime = document.getElementById("runtime").value;

    const popup = window.open(
        `${modpack}/${runtime}/index.html`,
        "CubeLauncher",
        "popup=yes,width=1280,height=720,left=100,top=100,resizable=yes,scrollbars=yes"
    );

    if (popup) popup.focus();
}

function updateRuntimeLabel(){
    const legacy = document.getElementById("runtime").value === "wasm_gc_legacy_offline";

    document.querySelectorAll(".modpack").forEach(button => {
        const name = button.dataset.name;

        if (legacy) {
            button.innerHTML = `${name} <span class="legacy-text">(Legacy)</span>`;
        } else {
            button.textContent = name;
        }
    });
}

function downloadFile(select) {
    if (!select.value) return;

    const link = document.createElement("a");
    link.href = select.value;
    link.download = "";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    select.selectedIndex = 0;
}

document.getElementById("runtime").addEventListener("change", updateRuntimeLabel);
updateRuntimeLabel();
</script>

</body>
</html>
